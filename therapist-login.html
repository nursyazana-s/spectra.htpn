<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SPECTRA — Child & Caregiver Details</title>
<link rel="stylesheet" href="../css/main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="spectra-chrome"></div>

<div class="page-shell">
  <button class="back-link" onclick="window.location.href='../index.html'">← <span id="backLabel">Back</span></button>

  <div class="card">
    <div class="card-emoji">📝</div>
    <h2 class="card-title" id="titleText">Child & Caregiver Details</h2>
    <p class="card-sub" id="subText">A few details before we begin</p>

    <div class="form-grid">
      <div class="form-field">
        <label id="lblName">Child's Name</label>
        <input id="fName" type="text" placeholder="e.g. Aisyah binti Ahmad"/>
      </div>
      <div class="form-field">
        <label id="lblPhone">Phone Number</label>
        <input id="fPhone" type="tel" placeholder="012-3456789"/>
      </div>
      <div class="form-field">
        <label id="lblIc6">IC Number (last 6 digits)</label>
        <input id="fIc6" type="text" maxlength="6" placeholder="123456"/>
        <span class="field-error" id="errIc6" style="display:none"></span>
      </div>
      <div class="form-field">
        <label id="lblAge">Age</label>
        <input id="fAge" type="number" min="0" max="18"/>
      </div>
      <div class="form-field">
        <label id="lblGender">Gender</label>
        <select id="fGender">
          <option value="">–</option>
          <option value="male" id="optMale">Male</option>
          <option value="female" id="optFemale">Female</option>
        </select>
      </div>
      <div class="form-field">
        <label id="lblBday">Date of Birth</label>
        <input id="fBday" type="date"/>
      </div>
      <div class="form-field full">
        <label id="lblEmail">Parent Email (required) <span class="req">*</span></label>
        <input id="fEmail" type="email" placeholder="mother@email.com"/>
        <span class="field-error" id="errEmail" style="display:none"></span>
      </div>
    </div>

    <button class="btn-primary" id="continueBtn">Continue</button>
  </div>
</div>

<script src="../js/spectra.js"></script>
<script>
function render(){
  const tt = t();
  document.getElementById("backLabel").textContent = tt.back;
  document.getElementById("titleText").textContent = tt.demoTitle;
  document.getElementById("subText").textContent = tt.demoSub;
  document.getElementById("lblName").textContent = tt.name;
  document.getElementById("lblPhone").textContent = tt.phone;
  document.getElementById("lblIc6").textContent = tt.ic6;
  document.getElementById("lblAge").textContent = tt.age;
  document.getElementById("lblGender").textContent = tt.gender;
  document.getElementById("optMale").textContent = tt.male;
  document.getElementById("optFemale").textContent = tt.female;
  document.getElementById("lblBday").textContent = tt.birthday;
  document.getElementById("lblEmail").innerHTML = tt.email + ' <span class="req">*</span>';
  document.getElementById("continueBtn").textContent = tt.continue;
}
render();

// restore any partially filled data
const draft = JSON.parse(sessionStorage.getItem("spectra_draft") || "{}");
["name","phone","ic6","age","gender","birthday","email"].forEach(k => {
  const el = document.getElementById("f" + k.charAt(0).toUpperCase() + k.slice(1));
  if (el && draft[k]) el.value = draft[k];
});

document.getElementById("fIc6").addEventListener("input", e => { e.target.value = e.target.value.replace(/\D/g, "").slice(0,6); });

document.getElementById("continueBtn").addEventListener("click", () => {
  const tt = t();
  const data = {
    name: document.getElementById("fName").value.trim(),
    phone: document.getElementById("fPhone").value.trim(),
    ic6: document.getElementById("fIc6").value.trim(),
    age: document.getElementById("fAge").value.trim(),
    gender: document.getElementById("fGender").value,
    birthday: document.getElementById("fBday").value,
    email: document.getElementById("fEmail").value.trim(),
    lang: getLang(),
  };
  let ok = true;
  const ic6Valid = /^\d{6}$/.test(data.ic6);
  const emailValid = /\S+@\S+\.\S+/.test(data.email);

  const errIc6 = document.getElementById("errIc6");
  if (!ic6Valid) { errIc6.style.display="block"; errIc6.textContent = tt.ic6Required; ok=false; } else { errIc6.style.display="none"; }

  const errEmail = document.getElementById("errEmail");
  if (!emailValid) { errEmail.style.display="block"; errEmail.textContent = tt.emailRequired; ok=false; } else { errEmail.style.display="none"; }

  if (!data.name) { ok=false; document.getElementById("fName").style.borderColor = "var(--danger)"; }

  if (!ok) return;
  sessionStorage.setItem("spectra_draft", JSON.stringify(data));
  window.location.href = "parent-questionnaire.html";
});
</script>
</body>
</html>
